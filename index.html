    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function formatRupiah(number) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

        const App = () => {
            const [route, setRoute] = useState('home'); // 'home' or 'pesanan'
            const [cart, setCart] = useState([]);
            const [firebaseReady, setFirebaseReady] = useState(!!window.firebaseDB);
            const [userPhone, setUserPhone] = useState(localStorage.getItem('userPhone') || '');
            const [menuItems, setMenuItems] = useState([]);

            useEffect(() => {
                const handleFirebaseReady = () => setFirebaseReady(true);
                window.addEventListener('firebaseReady', handleFirebaseReady);
                
                const savedCart = localStorage.getItem('mieayam_cart');
                if (savedCart) setCart(JSON.parse(savedCart));

                return () => window.removeEventListener('firebaseReady', handleFirebaseReady);
            }, []);

            useEffect(() => {
                localStorage.setItem('mieayam_cart', JSON.stringify(cart));
            }, [cart]);

            // Fetch Menu from Firebase Realtime
            useEffect(() => {
                if (!firebaseReady) return;
                const { db, collection, onSnapshot } = window.firebaseDB;
                
                const unsubscribe = onSnapshot(collection(db, 'menu'), (snapshot) => {
                    const items = [];
                    snapshot.forEach(doc => {
                        const data = doc.data();
                        console.log("fotoMenu URL:", data.fotoMenu); // Debugging agar URL bisa dipastikan benar-benar terbaca
                        items.push({
                            id: doc.id,
                            name: data.nama || data.name || 'Tanpa Nama',
                            desc: data.deskripsi || data.desc || '',
                            price: Number(data.harga || data.price || 0),
                            fotoMenu: data.fotoMenu, // Mengambil khusus field fotoMenu
                            status: data.status || 'tersedia'
                        });
                    });
                    setMenuItems(items);
                }, (error) => {
                    console.error("Error fetching menu:", error);
                });

                return () => unsubscribe();
            }, [firebaseReady]);

            const addToCart = (item) => {
                setCart(prev => {
                    const existing = prev.find(i => i.id === item.id);
                    if (existing) {
                        return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
                    }
                    return [...prev, { ...item, qty: 1 }];
                });
            };

            const updateQty = (id, delta) => {
                setCart(prev => prev.map(i => {
                    if (i.id === id) {
                        const newQty = i.qty + delta;
                        return newQty > 0 ? { ...i, qty: newQty } : i;
                    }
                    return i;
                }).filter(i => i.qty > 0));
            };

            const cartCount = cart.reduce((acc, item) => acc + item.qty, 0);

            return (

        const LandingPage = ({ addToCart, setRoute, menuItems }) => {

                    </section>

                    {/* Menu Section */}
                    <section id="menu" className="py-20 bg-light">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="text-center mb-16">
                                <h2 className="text-3xl font-bold text-dark mb-4">Menu Spesial Kami</h2>
                                <p className="text-gray-600 max-w-2xl mx-auto">Pilih menu favoritmu dan rasakan kelezatannya. Klik tambah pesanan untuk memasukkan ke keranjang.</p>

                            {menuItems.length === 0 ? (

                                    {menuItems.map(item => {

                                        return (
                                            <div key={item.id} className="bg-white rounded-2xl overflow-hidden shadow-lg hover:shadow-2xl transition duration-300 group flex flex-col relative">
                                                {isHabis && (
                                                    <div className="absolute inset-0 bg-white/60 z-10 flex items-center justify-center backdrop-blur-[1px]">
                                                        <span className="bg-red-600 text-white px-6 py-2 rounded-full font-bold text-lg shadow-lg transform -rotate-12 border-2 border-white">HABIS</span>

                                                <div className="relative h-48 overflow-hidden">

                                                        src={item.fotoMenu || 'https://via.placeholder.com/600x400?text=No+Image'}

                                                        onError={(e) => { e.target.onerror = null; e.target.src="https://via.placeholder.com/600x400?text=Gambar+Tidak+Tersedia" }}

                                                        {formatRupiah(item.price)}

                                                <div className="p-6 flex flex-col flex-grow">

                                                    <p className="text-gray-500 text-sm mb-6 flex-grow">{item.desc}</p>
                                                    <button

                    </section>

                    {/* Kontak Section */}
                    <section id="kontak" className="py-20 bg-dark text-white relative overflow-hidden">

                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">

                                    <p className="text-gray-300 mb-8 text-lg">Kami siap melayani Anda dengan sepenuh hati. Hubungi kami untuk pesanan dalam jumlah besar atau catering.</p>
                                    
                                    <div className="space-y-6">

                                            </div>
                                        </div>
                                        <div className="flex items-start">

        const PesananPage = ({ cart, updateQty, setCart, setRoute, firebaseReady, userPhone, setUserPhone }) => {
            const [formData, setFormData] = useState({ nama: '', phone: userPhone, alamat: '', catatan: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [orders, setOrders] = useState([]);
            const [activeTab, setActiveTab] = useState('cart'); // 'cart' or 'history'

            const totalPrice = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            // Fetch Orders Realtime
            useEffect(() => {
                if (!firebaseReady || !userPhone) return;

                const { db, collection, query, where, orderBy, onSnapshot } = window.firebaseDB;
                const ordersRef = collection(db, "orders");
                const q = query(ordersRef, where("nomorWhatsApp", "==", userPhone), orderBy("createdAt", "desc"));

                const unsubscribe = onSnapshot(q, (snapshot) => {
                    const fetchedOrders = [];
                    snapshot.forEach((doc) => {
                        fetchedOrders.push({ id: doc.id, ...doc.data() });
                    });
                    setOrders(fetchedOrders);
                }, (error) => {
                    console.error("Error fetching orders:", error);
                    if(error.message.includes('index')) {
                        const qFallback = query(ordersRef, where("nomorWhatsApp", "==", userPhone));
                        onSnapshot(qFallback, (snap) => {
                            const fallbackOrders = [];
                            snap.forEach((doc) => fallbackOrders.push({ id: doc.id, ...doc.data() }));
                            fallbackOrders.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                            setOrders(fallbackOrders);
                        });
                    }
                });

                return () => unsubscribe();
            }, [firebaseReady, userPhone]);

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0) return alert('Keranjang kosong!');
                if (!firebaseReady) return alert('Sistem sedang memuat, coba sebentar lagi.');

                setIsSubmitting(true);
                try {
                    const { db, collection, addDoc, serverTimestamp } = window.firebaseDB;
                    
                    const orderData = {
                        namaPelanggan: formData.nama,
                        nomorWhatsApp: formData.phone,
                        alamat: formData.alamat,
                        daftarPesanan: cart.map(item => ({ nama: item.name, harga: item.price, qty: item.qty })),
                        jumlahItem: cart.reduce((acc, item) => acc + item.qty, 0),
                        totalHarga: totalPrice,
                        catatanTambahan: formData.catatan,
                        statusPesanan: 'menunggu',
                        createdAt: serverTimestamp()
                    };

                    await addDoc(collection(db, "orders"), orderData);
                    
                    // Save phone to track history
                    localStorage.setItem('userPhone', formData.phone);
                    setUserPhone(formData.phone);
                    
                    // Clear cart
                    setCart([]);
                    
                    alert("Pesanan berhasil dikirim");
                    
                    setActiveTab('history');

                } catch (error) {
                    console.error("Checkout Error:", error);
                    alert("Terjadi kesalahan saat memproses pesanan.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            const getStatusColor = (status) => {
                const s = status?.toLowerCase() || '';
                switch(s) {
                    case 'menunggu': return 'bg-yellow-100 text-yellow-800 border border-yellow-200';
                    case 'diterima': return 'bg-blue-100 text-blue-800 border border-blue-200';
                    case 'diproses': return 'bg-purple-100 text-purple-800 border border-purple-200';
                    case 'selesai': return 'bg-green-100 text-green-800 border border-green-200';
                    case 'ditolak': return 'bg-red-100 text-red-800 border border-red-200';
                    default: return 'bg-gray-100 text-gray-800 border border-gray-200';
                }
            };

            return (
                <div className="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10 fade-in">
                    <div className="flex items-center mb-8">
                        <button onClick={() => setRoute('home')} className="mr-4 w-10 h-10 bg-white rounded-full flex items-center justify-center shadow hover:bg-gray-50 transition">
                            <i className="fas fa-arrow-left text-dark"></i>
                        </button>
                        <h1 className="text-3xl font-bold text-dark">Menu Pesanan</h1>
                    </div>

                    <div className="flex space-x-4 mb-8 border-b border-gray-200">
                        <button 
                            onClick={() => setActiveTab('cart')} 
                            className={`pb-4 px-4 font-semibold text-lg transition-colors border-b-2 ${activeTab === 'cart' ? 'border-primary text-primary' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                        >
                            Keranjang Aktif
                        </button>
                        <button 
                            onClick={() => setActiveTab('history')} 
                            className={`pb-4 px-4 font-semibold text-lg transition-colors border-b-2 ${activeTab === 'history' ? 'border-primary text-primary' : 'border-transparent text-gray-500 hover:text-gray-700'}`}
                        >
                            Riwayat Pesanan
                        </button>
                    </div>

                    {activeTab === 'cart' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="p-6 border-b border-gray-100 bg-gray-50">
                                        <h2 className="text-xl font-bold">Daftar Pesanan</h2>
                                    </div>
                                    <div className="p-6">
                                        {cart.length === 0 ? (
                                            <div className="text-center py-10 text-gray-500">
                                                <i className="fas fa-shopping-basket text-5xl mb-4 text-gray-300"></i>
                                                <p>Keranjang masih kosong.</p>
                                                <button onClick={() => setRoute('home')} className="mt-4 text-primary font-semibold hover:underline">Lihat Menu</button>
                                            </div>
                                        ) : (
                                            <div className="space-y-6">
                                                {cart.map(item => (
                                                    <div key={item.id} className="flex items-center justify-between">
                                                        <div className="flex items-center">
                                                            <img 
                                                                src={item.fotoMenu || 'https://via.placeholder.com/600x400?text=No+Image'} 
                                                                alt={item.name} 
                                                                onError={(e) => { e.target.onerror = null; e.target.src="https://via.placeholder.com/600x400?text=Gambar+Tidak+Tersedia" }}
                                                                className="w-16 h-16 rounded-xl object-cover mr-4" 
                                                            />
                                                            <div>
                                                                <h4 className="font-bold text-dark">{item.name}</h4>
                                                                <p className="text-primary font-medium">{formatRupiah(item.price)}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center bg-gray-100 rounded-full px-2 py-1">
                                                            <button onClick={() => updateQty(item.id, -1)} className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white transition"><i className="fas fa-minus text-sm"></i></button>
                                                            <span className="w-8 text-center font-bold">{item.qty}</span>
                                                            <button onClick={() => updateQty(item.id, 1)} className="w-8 h-8 rounded-full flex items-center justify-center hover:bg-white transition"><i className="fas fa-plus text-sm"></i></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                    {cart.length > 0 && (
                                        <div className="p-6 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
                                            <span className="text-gray-600 font-medium">Total Harga</span>
                                            <span className="text-2xl font-bold text-dark">{formatRupiah(totalPrice)}</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="lg:col-span-1">
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden sticky top-24">
                                    <div className="p-6 border-b border-gray-100 bg-gray-50">
                                        <h2 className="text-xl font-bold">Form Checkout</h2>
                                    </div>
                                    <form onSubmit={handleCheckout} className="p-6 space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                                            <input required type="text" value={formData.nama} onChange={e => setFormData({...formData, nama: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Budi Santoso" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Nomor WhatsApp</label>
                                            <input required type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="08123456789" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Alamat Pengiriman</label>
                                            <textarea required rows="3" value={formData.alamat} onChange={e => setFormData({...formData, alamat: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Jl. Mawar No. 123..."></textarea>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Catatan Tambahan (Opsional)</label>
                                            <input type="text" value={formData.catatan} onChange={e => setFormData({...formData, catatan: e.target.value})} className="w-full px-4 py-2 border border-gray-300 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition" placeholder="Pedas, pisah kuah..." />
                                        </div>
                                        
                                        <button 
                                            type="submit" 
                                            disabled={cart.length === 0 || isSubmitting}
                                            className={`w-full py-3 rounded-xl font-bold text-white transition flex justify-center items-center ${cart.length === 0 || isSubmitting ? 'bg-gray-400 cursor-not-allowed' : 'bg-primary hover:bg-secondary shadow-lg shadow-primary/30'}`}
                                        >
                                            {isSubmitting ? <i className="fas fa-spinner fa-spin text-xl"></i> : 'Kirim Pesanan'}
                                        </button>
                                        <p className="text-xs text-center text-gray-500 mt-2">
                                            Pesanan akan langsung masuk ke sistem admin kami secara otomatis.
                                        </p>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === 'history' && (
                        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
                            {!userPhone ? (
                                <div className="text-center py-10">
                                    <p className="text-gray-500 mb-4">Masukkan nomor WhatsApp Anda untuk melihat riwayat pesanan.</p>
                                    <div className="max-w-xs mx-auto flex">
                                        <input type="tel" id="checkPhone" className="flex-1 px-4 py-2 border border-gray-300 rounded-l-xl focus:outline-none" placeholder="081234..." />
                                        <button onClick={() => setUserPhone(document.getElementById('checkPhone').value)} className="bg-primary text-white px-4 py-2 rounded-r-xl font-bold">Cek</button>
                                    </div>
                                </div>
                            ) : orders.length === 0 ? (
                                <div className="text-center py-10 text-gray-500">
                                    <i className="fas fa-receipt text-5xl mb-4 text-gray-300"></i>
                                    <p>Belum ada riwayat pesanan untuk nomor {userPhone}.</p>
                                </div>
                            ) : (
                                <div className="space-y-4">
                                    {orders.map(order => (
                                        <div key={order.id} className="border border-gray-100 rounded-xl p-5 hover:shadow-md transition">
                                            <div className="flex flex-col md:flex-row justify-between md:items-center mb-4 pb-4 border-b border-gray-50 gap-2">
                                                <div>
                                                    <span className="text-xs text-gray-500 block mb-1">
                                                        {order.createdAt ? new Date(order.createdAt?.toMillis ? order.createdAt.toMillis() : order.createdAt).toLocaleString('id-ID', { dateStyle: 'medium', timeStyle: 'short' }) : 'Waktu tidak tersedia'}
                                                    </span>
                                                    <span className={`text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wide inline-block mt-1 ${getStatusColor(order.statusPesanan)}`}>
                                                        {order.statusPesanan || 'menunggu'}
                                                    </span>
                                                </div>
                                                <div className="text-left md:text-right">
                                                    <span className="text-sm text-gray-500 block">Total Belanja</span>
                                                    <span className="font-bold text-lg text-dark">{formatRupiah(order.totalHarga)}</span>
                                                </div>
                                            </div>
                                            <div className="text-sm text-gray-700">
                                                <p className="font-semibold mb-2">Item Pesanan:</p>
                                                <ul className="list-disc list-inside space-y-1 text-gray-600">
                                                    {order.daftarPesanan?.map((item, idx) => (
                                                        <li key={idx}>{item.qty}x {item.nama}</li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const FloatingNav = ({ setRoute, cartCount }) => {
            return (
                <div className="fixed bottom-6 right-6 flex flex-col gap-3 z-50">
                    <button onClick={() => { setRoute('pesanan'); window.scrollTo(0,0); }} className="w-14 h-14 bg-primary text-white rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition relative">
                        <i className="fas fa-shopping-cart text-xl"></i>
                        {cartCount > 0 && (
                            <span className="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-6 h-6 rounded-full flex items-center justify-center border-2 border-white">
                                {cartCount}
                            </span>
                        )}
                    </button>
                    <a href={`https://wa.me/${WA_NUMBER}`} target="_blank" rel="noreferrer" className="w-14 h-14 bg-green-500 text-white rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition">
                        <i className="fab fa-whatsapp text-2xl"></i>
                    </a>
                    <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="w-14 h-14 bg-dark text-white rounded-full shadow-xl flex items-center justify-center hover:scale-110 transition">
                        <i className="fas fa-arrow-up text-xl"></i>
                    </button>
                </div>
            );
        };

        const Footer = () => {
            return (
                <footer className="bg-dark text-gray-400 py-12 border-t border-gray-800 mt-auto">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div>
                                <div className="flex items-center mb-4">
                                    <i className="fas fa-bowl-food text-2xl text-primary mr-2"></i>
                                    <span className="font-bold text-xl text-white">MieAyam<span className="text-primary">Juara</span></span>
                                </div>
                                <p className="text-sm">Menyajikan mie ayam dengan resep spesial, kuah kaldu gurih alami, dan topping pilihan berkualitas tinggi sejak 2010.</p>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-4">Tautan Cepat</h4>
                                <ul className="space-y-2 text-sm">
                                    <li><a href="#tentang" className="hover:text-primary transition">Tentang Kami</a></li>
                                    <li><a href="#menu" className="hover:text-primary transition">Menu Spesial</a></li>
                                    <li><a href="#kontak" className="hover:text-primary transition">Hubungi Kami</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-white font-bold mb-4">Sosial Media</h4>
                                <div className="flex space-x-4">
                                    <a href="#" className="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition"><i className="fab fa-instagram"></i></a>
                                    <a href="#" className="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition"><i className="fab fa-facebook-f"></i></a>
                                    <a href="#" className="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center hover:bg-primary hover:text-white transition"><i className="fab fa-tiktok"></i></a>
                                </div>
                            </div>
                        </div>
                        <div className="border-t border-gray-800 mt-8 pt-8 text-center text-sm">
                            <p>&copy; {new Date().getFullYear()} Mie Ayam Juara. All rights reserved.</p>
                        </div>
                    </div>
                </footer>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
